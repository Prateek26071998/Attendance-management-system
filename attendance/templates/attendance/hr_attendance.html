<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HR Mark Attendance</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #1d2671, #c33764);
            min-height: 100vh;
        }

        .card-box {
            border-radius: 18px;
            animation: fadeIn 0.6s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(25px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .title-badge {
            background: linear-gradient(135deg, #198754, #20c997);
            color: white;
            padding: 10px 22px;
            border-radius: 30px;
            font-weight: 700;
        }

        .btn-submit {
            background: #198754;
            color: white;
            font-weight: 600;
        }

        .btn-submit:hover {
            background: #157347;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark shadow-sm">
    <div class="container-fluid">
        <span class="navbar-brand fw-bold">
            🧑‍💼 HR Panel
        </span>

        <div>
            <a href="/hr/attendance/report/" class="btn btn-outline-light btn-sm me-2">
                Dashboard
            </a>
            <a href="/logout/" class="btn btn-danger btn-sm">
                Logout
            </a>
        </div>
    </div>
</nav>

<!-- MAIN CONTENT -->
<div class="container mt-5">

    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card shadow-lg border-0 card-box">
                <div class="card-body p-4">

                    <div class="text-center mb-4">
                        <span class="title-badge">
                            📅 Mark Employee Attendance
                        </span>
                    </div>

                    <!-- MESSAGE POPUPS -->
                    {% if messages %}
                        {% for message in messages %}
                            <div class="alert alert-{{ message.tags }} text-center">
                                {{ message }}
                            </div>
                        {% endfor %}
                    {% endif %}

                    <!-- ATTENDANCE FORM -->
                    <form method="POST">
                        {% csrf_token %}

                        <!-- Employee Select -->
                        <div class="mb-3">
                            <label class="form-label fw-semibold">
                                <i class="bi bi-person-badge"></i> Select Employee
                            </label>

                            <select name="employee" class="form-select" required>
                                {% for emp in employees %}
                                <option value="{{ emp.id }}">
                                    {{ emp.email }}
                                </option>
                                {% endfor %}
                            </select>
                        </div>

                        <!-- Status -->
                        <div class="mb-4">
                            <label class="form-label fw-semibold">
                                <i class="bi bi-check-circle"></i> Attendance Status
                            </label>

                            <select name="status" class="form-select">
                                <option value="PRESENT">Present</option>
                                <option value="ABSENT">Absent</option>
                            </select>
                        </div>

                        <!-- Submit Button -->
                        <div class="d-grid">
                            <button type="submit" class="btn btn-submit btn-lg">
                                ✔ Submit Attendance
                            </button>
                        </div>

                    </form>

                </div>
            </div>

        </div>
    </div>

</div>

</body>
</html>
