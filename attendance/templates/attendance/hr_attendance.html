<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mark Attendance</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
        }

        .attendance-card {
            border-radius: 20px;
            animation: fadeIn 0.6s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-select, .btn {
            border-radius: 12px;
        }

        .badge-title {
            background: linear-gradient(135deg, #28a745, #20c997);
            border-radius: 30px;
            padding: 10px 20px;
            color: #fff;
            display: inline-block;
        }
    </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark shadow-sm">
    <div class="container-fluid">
        <span class="navbar-brand fw-bold">
            🧑‍💼 HR Panel
        </span>

        <div>
            <a href="/dashboard/hr/" class="btn btn-outline-light btn-sm me-2">
                ⬅ Dashboard
            </a>
            <a href="/logout/" class="btn btn-danger btn-sm">
                Logout
            </a>
        </div>
    </div>
</nav>

<!-- MAIN CONTENT -->
<div class="container d-flex justify-content-center align-items-center mt-5">

    <div class="col-md-6">

        <div class="card attendance-card shadow-lg border-0">
            <div class="card-body p-4">

                <div class="text-center mb-4">
                    <span class="badge-title">
                        📅 Mark Employee Attendance
                    </span>
                </div>

                <form method="POST">
                    {% csrf_token %}

                    <!-- Employee -->
                    <div class="mb-3">
                        <label class="form-label fw-semibold">
                            <i class="bi bi-person-badge-fill text-primary"></i>
                            Select Employee
                        </label>
                        <select name="employee" class="form-select" required>
                            {% for emp in employees %}
                                <option value="{{ emp.id }}">
                                    {{ emp.email }}
                                </option>
                            {% endfor %}
                        </select>
                    </div>

                    <!-- Status -->
                    <div class="mb-4">
                        <label class="form-label fw-semibold">
                            <i class="bi bi-check-circle-fill text-success"></i>
                            Attendance Status
                        </label>
                        <select name="status" class="form-select" required>
                            <option value="PRESENT">✅ Present</option>
                            <option value="ABSENT">❌ Absent</option>
                        </select>
                    </div>

                    <!-- Button -->
                    <div class="d-grid">
                        <button type="submit" class="btn btn-lg btn-success shadow">
                            <i class="bi bi-save2-fill"></i>
                            Submit Attendance
                        </button>
                    </div>

                </form>

            </div>
        </div>

    </div>
</div>

</body>
</html>
