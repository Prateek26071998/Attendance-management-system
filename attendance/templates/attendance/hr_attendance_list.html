<!DOCTYPE html>
<html>
<head>
    <title>Attendance List</title>
    <style>
        table {
            border-collapse: collapse;
            width: 90%;
        }
        th, td {
            border: 1px solid #333;
            padding: 8px;
            text-align: center;
        }
        th {
            background-color: #eee;
        }
    </style>
</head>
<body>

<h2>Attendance Records</h2>

<table>
    <tr>
        <th>Employee</th>
        <th>Email</th>
        <th>Date</th>
        <th>Status</th>
    </tr>

    {% for record in records %}
    <tr>
        <td>{{ record.user.username }}</td>
        <td>{{ record.user.email }}</td>
        <td>{{ record.date }}</td>
        <td>{{ record.status }}</td>
    </tr>
    {% empty %}
    <tr>
        <td colspan="4">No records found</td>
    </tr>
    {% endfor %}
</table>

<br>
<a href="/hr/attendance/">⬅ Back to Mark Attendance</a>

</body>
</html>
