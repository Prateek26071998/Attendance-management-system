<!DOCTYPE html>
<html>
<head>
    <title>Employee Attendance</title>
</head>
<body>
{% if messages %}
  {% for message in messages %}
    <div class="alert alert-{{ message.tags }} text-center">
      {{ message }}
    </div>
  {% endfor %}
{% endif %}

<h2>Employee Attendance</h2>

{% if already_marked %}
    <p style="color: green;">✅ Attendance already marked for today</p>
{% else %}
    <form method="POST">
        {% csrf_token %}
        <button type="submit">Mark Present</button>
    </form>
{% endif %}

</body>
</html>
